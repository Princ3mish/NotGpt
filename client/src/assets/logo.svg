<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
<rect width="60" height="60" rx="14" fill="url(#grad)"/>
<!-- Robot Head -->
<rect x="19" y="20" width="22" height="20" rx="5" stroke="white" stroke-width="2" fill="none"/>
<!-- Eyes -->
<circle cx="25" cy="30" r="2" fill="white"/>
<circle cx="35" cy="30" r="2" fill="white"/>
<!-- Antenna -->
<line x1="30" y1="14" x2="30" y2="20" stroke="white" stroke-width="2"/>
<circle cx="30" cy="11" r="3" fill="white"/>
<!-- Mouth -->
<line x1="25" y1="37" x2="35" y2="37" stroke="white" stroke-width="2"/>
<defs>
<linearGradient id="grad" x1="60" y1="15" x2="-10" y2="60" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#4080F6"/>
<stop offset="1" stop-color="#A356F7"/>
</linearGradient>
</defs>
</svg>
